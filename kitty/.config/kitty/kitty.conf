# ~/.config/kitty/kitty.conf
#include current-theme.conf
enable_audio_bell no

# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family='MesloLGS Nerd Font Mono' postscript_name=MesloLGSNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS